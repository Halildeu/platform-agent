# Faz 22.5 M1 — artifact host static serving config.
# Replaces the stock nginx default.conf. Serves ONLY /artifacts/** and
# /healthz; everything else is a hard 404. There is deliberately NO SPA
# fallback: a missing artifact must 404, never hand PowerShell an HTML page
# to execute (the exact failure mode that motivated this host).
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  autoindex off;
  server_tokens off;
  # mime.types (http{} include) maps .zip -> application/zip; unknown
  # extensions (.ps1) fall back to octet-stream so clients download bytes.
  default_type application/octet-stream;

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 'ok';
  }

  # MUTABLE 'current' alias (Faz 22.5 — UI one-command discovery). It re-points
  # to the deployed image's version on every release, so it MUST NOT inherit the
  # immutable 1y cache of the versioned location below: a client (or proxy) that
  # cached it would pin a stale bootstrap/hash after a version bump. ^~ takes
  # priority over the plain-prefix match below, so this wins for /current/.
  location ^~ /artifacts/endpoint-agent/current/ {
    try_files $uri =404;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Cache-Control "no-store, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
  }

  # Versioned, immutable artifacts. try_files ... =404 (no index fallback).
  location /artifacts/ {
    try_files $uri =404;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  # This host serves nothing else.
  location / {
    return 404;
  }
}
