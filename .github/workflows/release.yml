# Faz 22.1.0 release foundation (Codex 019e8284 PARTIAL→AGREE plan).
#
# Tag-driven release pipeline that produces a one-line-install GitHub
# Release for the Windows endpoint agent. Faz 22.1 stays on lab-only
# ephemeral signing (per ADR-0012-EA §22.1 Lab); the trusted-signing tier
# is gated to `v*.*.*` (no `-lab.N` suffix) and stays parked until Faz
# 22.2 Azure Trusted Signing is wired up.
#
# Tag conventions:
#   v0.1.0-lab.1   — Faz 22.1 lab-only-evidence (this PR's target)
#   v0.1.0         — Faz 22.2 trusted-signing release (parked)
#
# What this workflow does NOT do (yet):
#   - Authenticode trusted signing — Faz 22.2 via Azure Trusted Signing
#   - MSI packaging — out of scope for the one-line PowerShell install
#   - cosign manifest signing — covered by gate-sbom.yml at PR time
#
# Outputs (per release):
#   - endpoint-agent.exe    : signed Windows amd64 binary
#   - install.ps1           : patched copy with embedded release manifest
#   - uninstall.ps1         : unchanged copy from installers/windows/
#   - SHA256SUMS            : post-sign hashes (audit secondary evidence)
#   - release-manifest.json : machine-readable release contract
#   - RELEASE_NOTES.md      : auto-generated from tag annotation
#
# Tracked-by: platform-k8s-gitops Faz 22.5 §3 — agent distribution.

name: Release (Faz 22.1 lab / 22.2 trusted)

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-lab.*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (must already exist as a git tag)"
        required: true
        type: string

permissions:
  contents: write   # gh release create + asset upload
  id-token: write   # reserved for future Azure Trusted Signing OIDC

env:
  GO_VERSION: "1.25.0"

jobs:
  # =========================================================================
  # Job 1: classify the tag, decide the signing tier + prerelease flag,
  # block trusted-signing tier until Faz 22.2 lands.
  # =========================================================================
  classify-release:
    name: Classify tag → signing tier
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.classify.outputs.tag }}
      signing_tier: ${{ steps.classify.outputs.signing_tier }}
      prerelease: ${{ steps.classify.outputs.prerelease }}
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if ! printf '%s' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-lab\.[0-9]+)?$'; then
            echo "::error::tag '$TAG' does not match v*.*.* or v*.*.*-lab.N"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Classify
        id: classify
        run: |
          TAG='${{ steps.tag.outputs.tag }}'
          if printf '%s' "$TAG" | grep -Eq -- '-lab\.[0-9]+$'; then
            TIER="lab-only-evidence"
            PRE="true"
          else
            TIER="trusted"
            PRE="false"
          fi
          if [ "$TIER" = "trusted" ]; then
            # Faz 22.1 boundary guard — do NOT publish a "trusted"
            # release until Azure Trusted Signing OIDC is wired up
            # (separate PR, Faz 22.2). The lab branch can still ship.
            echo "::error::trusted-signing tier is parked until Faz 22.2 — use a -lab.N tag for now"
            exit 1
          fi
          echo "tag=$TAG"           >> "$GITHUB_OUTPUT"
          echo "signing_tier=$TIER" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRE"    >> "$GITHUB_OUTPUT"
          echo "Classified $TAG as tier=$TIER prerelease=$PRE"

  # =========================================================================
  # Job 2: Windows amd64 build + ephemeral lab signing + post-sign hash
  # + install.ps1 patch + SHA256SUMS + release-manifest.json.
  # Windows runner is required for signtool + Get-AuthenticodeSignature.
  # =========================================================================
  build-and-sign:
    name: Windows build + lab sign + manifest patch
    needs: classify-release
    runs-on: windows-2022
    timeout-minutes: 30
    outputs:
      sha256: ${{ steps.sign-and-hash.outputs.sha256 }}
      thumbprint: ${{ steps.sign-and-hash.outputs.thumbprint }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # tag annotation reachable for RELEASE_NOTES

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build Windows amd64 binary
        shell: pwsh
        env:
          CGO_ENABLED: "0"
          GOOS: windows
          GOARCH: amd64
          TAG: ${{ needs.classify-release.outputs.tag }}
        run: |
          $LDFLAGS = "-s -w -X platform-agent/internal/config.BuildVersion=$env:TAG"
          go build -trimpath -ldflags "$LDFLAGS" `
              -o dist/endpoint-agent.exe ./cmd/endpoint-agent
          if (-not (Test-Path dist/endpoint-agent.exe)) {
            throw "build did not produce dist/endpoint-agent.exe"
          }

      - name: Sign with ephemeral lab cert + post-sign hash
        id: sign-and-hash
        shell: pwsh
        env:
          TAG: ${{ needs.classify-release.outputs.tag }}
        run: |
          # Faz 22.1 invariant — ephemeral self-signed cert per release.
          # Pattern reused from ci-build-test.yml; the cert never leaves
          # this runner and the public thumbprint becomes the embedded
          # pin in install.ps1.
          $cert = New-SelfSignedCertificate `
              -Subject "CN=platform-agent lab-only-evidence $env:TAG" `
              -CertStoreLocation Cert:\CurrentUser\My `
              -Type CodeSigningCert `
              -KeyUsage DigitalSignature `
              -KeyAlgorithm RSA -KeyLength 2048 `
              -NotAfter (Get-Date).AddDays(30)
          $thumb = $cert.Thumbprint

          $signtool = Get-Command signtool.exe -ErrorAction Stop
          & $signtool.Source sign `
              /sha1 $thumb /fd SHA256 /td SHA256 `
              /tr "http://timestamp.digicert.com" `
              dist/endpoint-agent.exe
          if ($LASTEXITCODE -ne 0) {
            throw "signtool sign failed (exit $LASTEXITCODE)"
          }

          # Post-sign hash (Codex 019e8284 must_fix #3): SHA256SUMS and
          # the embedded ExpectedSha256 MUST be computed AFTER signtool
          # mutates the PE timestamp/signature blob.
          $hash = (Get-FileHash -Algorithm SHA256 dist/endpoint-agent.exe).Hash
          $sig  = Get-AuthenticodeSignature dist/endpoint-agent.exe
          if ($sig.Status -eq "NotSigned") {
            throw "post-sign verify failed: signature unreadable"
          }

          "sha256=$hash" | Out-File -Append -Encoding ascii $env:GITHUB_OUTPUT
          "thumbprint=$thumb" | Out-File -Append -Encoding ascii $env:GITHUB_OUTPUT
          Write-Host "post-sign sha256 = $hash"
          Write-Host "signer thumbprint = $thumb"

      - name: Patch installer manifest
        shell: pwsh
        env:
          TAG: ${{ needs.classify-release.outputs.tag }}
          TIER: ${{ needs.classify-release.outputs.signing_tier }}
          SHA256: ${{ steps.sign-and-hash.outputs.sha256 }}
          THUMB: ${{ steps.sign-and-hash.outputs.thumbprint }}
        run: |
          $repo = "${{ github.repository }}"
          $binaryUrl = "https://github.com/$repo/releases/download/$env:TAG/endpoint-agent.exe"
          pwsh scripts/release/patch-installer-manifest.ps1 `
              -InputPath installers/windows/install.ps1 `
              -OutputPath dist/install.ps1 `
              -BinaryUrl $binaryUrl `
              -ExpectedSha256 $env:SHA256 `
              -ExpectedSignerThumbprint $env:THUMB `
              -SigningTier $env:TIER `
              -ReleaseTag $env:TAG
          Copy-Item installers/windows/uninstall.ps1 dist/uninstall.ps1

      - name: SHA256SUMS + release-manifest.json
        shell: pwsh
        env:
          TAG: ${{ needs.classify-release.outputs.tag }}
          TIER: ${{ needs.classify-release.outputs.signing_tier }}
          SHA256: ${{ steps.sign-and-hash.outputs.sha256 }}
          THUMB: ${{ steps.sign-and-hash.outputs.thumbprint }}
        run: |
          $assets = @(
            "endpoint-agent.exe",
            "install.ps1",
            "uninstall.ps1"
          )
          $sumLines = @()
          foreach ($a in $assets) {
            $h = (Get-FileHash -Algorithm SHA256 "dist/$a").Hash.ToLowerInvariant()
            $sumLines += "$h  $a"
          }
          $sumLines -join "`n" | Out-File -Encoding ascii dist/SHA256SUMS

          $manifest = [ordered]@{
            schema_version = 1
            release_tag    = $env:TAG
            signing_tier   = $env:TIER
            signer_thumbprint = $env:THUMB
            endpoint_agent_sha256 = $env:SHA256
            phase = "22.1.0"
            assets = @(
              [ordered]@{ name = "endpoint-agent.exe"; sha256 = $env:SHA256 }
              [ordered]@{ name = "install.ps1";        sha256 = (Get-FileHash -Algorithm SHA256 dist/install.ps1).Hash.ToLowerInvariant() }
              [ordered]@{ name = "uninstall.ps1";      sha256 = (Get-FileHash -Algorithm SHA256 dist/uninstall.ps1).Hash.ToLowerInvariant() }
            )
          }
          ($manifest | ConvertTo-Json -Depth 6) `
            | Out-File -Encoding utf8 dist/release-manifest.json

      - name: Emit RELEASE_NOTES.md
        shell: pwsh
        env:
          TAG: ${{ needs.classify-release.outputs.tag }}
          TIER: ${{ needs.classify-release.outputs.signing_tier }}
          SHA256: ${{ steps.sign-and-hash.outputs.sha256 }}
        run: |
          $notes = @"
# platform-agent $env:TAG

> **Signing tier**: ``$env:TIER`` — lab-only-evidence releases use an ephemeral self-signed certificate generated on the release runner. They are **not** trusted by Windows out of the box; the install path requires explicit ``-AcceptLabOnlySigning`` opt-in. **Do not install on production endpoints**. Trusted-signing releases (``v*.*.*`` without ``-lab.N``) are parked until Faz 22.2 Azure Trusted Signing.

## One-line lab install

``````powershell
& ([scriptblock]::Create((iwr -useb "https://github.com/${{ github.repository }}/releases/download/$env:TAG/install.ps1").Content)) ``
    -ApiUrl "https://api.acik.com" ``
    -EnrollmentToken `$env:ENROLLMENT_TOKEN ``
    -AcceptLabOnlySigning ``
    -Start
``````

## Artifacts

| Asset | SHA-256 |
|---|---|
| ``endpoint-agent.exe`` | ``$env:SHA256`` |

The ``SHA256SUMS`` and ``release-manifest.json`` assets carry the full set of post-sign hashes for audit. The installer itself embeds the same ``ExpectedSha256`` and ``ExpectedSignerThumbprint`` as its defaults, so a tampered ``install.ps1`` cannot point the operator at a different binary without the operator overriding the values on the command line.

Tracked-by: platform-k8s-gitops Faz 22.5 §3 — agent distribution.
"@
          $notes | Out-File -Encoding utf8 dist/RELEASE_NOTES.md

      - name: Upload release dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist/
          retention-days: 30

  # =========================================================================
  # Job 3: publish the GitHub Release. Separated from build-and-sign so the
  # signing runner does not need contents:write at the OS layer.
  # =========================================================================
  publish:
    name: Publish GitHub Release
    needs: [classify-release, build-and-sign]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (for repo path only)
        uses: actions/checkout@v4

      - name: Download release dist
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.classify-release.outputs.tag }}
          PRE: ${{ needs.classify-release.outputs.prerelease }}
        run: |
          set -euo pipefail
          PRE_FLAG=""
          if [ "$PRE" = "true" ]; then PRE_FLAG="--prerelease"; fi
          # --verify-tag refuses to overwrite an existing release on the
          # same tag — re-publish is a deliberate operator action, not a
          # silent CI overwrite. (Codex 019e8284 must_fix-adjacent
          # guardrail.)
          gh release create "$TAG" $PRE_FLAG \
              --verify-tag \
              --title "platform-agent $TAG" \
              --notes-file dist/RELEASE_NOTES.md \
              dist/endpoint-agent.exe \
              dist/install.ps1 \
              dist/uninstall.ps1 \
              dist/SHA256SUMS \
              dist/release-manifest.json
