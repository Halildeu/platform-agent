name: Gate - Secrets (gitleaks)

# Faz 22.1.0 — Agent supply-chain hardening (gitleaks).
# ADR-0011 BG-1 governance pattern: secret leak guard her PR'da.
#
# Reference:
# - ADR-0012-EA: Halildeu/platform-k8s-gitops
#   docs/adr/0012-EA-endpoint-admin-governance-charter.md
#   (DD-EA-7 Identity discovery PII boundary + secret/PII guard)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history for gitleaks

      # gitleaks/gitleaks-action@v2 PRIVATE repolarda lisans key gerektirir.
      # Self-hosted gitleaks CLI direkt kullanım (license bypass).
      - name: Install gitleaks CLI
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.24.3"
          curl -sSfL "https://github.com/zricethezav/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks scan (full history)
        run: |
          set -euo pipefail
          # --no-banner reduces output noise
          # --redact ensures any leaked secrets shown in masked form
          # --exit-code 1 on findings
          gitleaks detect \
            --source=. \
            --no-banner \
            --redact \
            --report-format=json \
            --report-path=gitleaks-report.json \
            --verbose

      - name: Upload report (always, for forensics)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gitleaks-report-${{ github.sha }}
          path: gitleaks-report.json
          retention-days: 30
