name: Gate - Secrets (gitleaks)

# Faz 22.1.0 — Agent supply-chain hardening (gitleaks).
# ADR-0011 BG-1 governance pattern: secret leak guard her PR'da.
#
# Reference:
# - ADR-0012-EA: Halildeu/platform-k8s-gitops
#   docs/adr/0012-EA-endpoint-admin-governance-charter.md
#   (DD-EA-7 Identity discovery PII boundary + secret/PII guard)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history for gitleaks

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Default config detects: AWS, GitHub tokens, generic secrets,
          # password-like strings, JWT tokens, etc.
