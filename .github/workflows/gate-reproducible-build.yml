# Faz 22.6 D10-5a (ADR-0034 §11/D10 item #5) — Reproducible-build PROOF.
#
# The agent-attestation gate's foundation: the UNSIGNED endpoint-agent binary
# must build BYTE-IDENTICALLY from the same source on a fixed toolchain. This
# proves the artifact provenance ("the bytes the SBOM/allowlist describe are the
# bytes anyone rebuilding this commit gets") — the prerequisite for the runtime
# binary-hash attestation (D10-5b/c, broker-side).
#
# SCOPE (Codex 019ebc4c): this proves the UNSIGNED build is reproducible. The
# SIGNED release exe / MSI are deliberately NOT reproducible (Authenticode
# signature + timestamp vary) — the runtime allowlist (D10-5b/c) uses the
# signed/MSI runtime-artifact hash; THIS proof hash is provenance evidence, a
# DIFFERENT value. The two are never conflated.
#
# Determinism profile (Codex): -trimpath -buildvcs=false -mod=readonly
# -buildid= + pinned BuildVersion + SOURCE_DATE_EPOCH + GOTOOLCHAIN=local +
# go.mod-pinned Go + go mod verify + separate GOCACHE per build (so a cache
# reuse can't mask non-determinism) + NO .syso resource (unsigned, resourceless).

name: Gate - Reproducible Build (D10-5a)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reproducible-build:
    name: Unsigned endpoint-agent builds byte-identically twice
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Fixed, version-control-independent inputs — every knob that could vary
      # between two builds of the same source is pinned here.
      GOOS: windows
      GOARCH: amd64
      CGO_ENABLED: "0"
      GOTOOLCHAIN: local
      # A pinned, run-number-FREE version for the proof build (the released
      # artifact still carries the real 0.1.0-ci.<run>.g<sha>; the proof needs a
      # constant so the two builds match).
      REPRO_BUILD_VERSION: 0.1.0-repro
      # A fixed epoch so any (currently none) embed/timestamp path is stable.
      SOURCE_DATE_EPOCH: "1700000000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Go version from go.mod (exact pin)
        id: go-version
        run: |
          VERSION=$(grep '^go ' go.mod | awk '{print $2}')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Go (go.mod pin): ${VERSION}"

      - name: Setup Go (pinned, no auto-toolchain)
        uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.go-version.outputs.version }}
          check-latest: false

      - name: Verify module graph is intact (no silent drift)
        run: go mod verify

      - name: Build #1 (isolated cache)
        run: |
          GOCACHE="${RUNNER_TEMP}/gocache-1" \
          go build -trimpath -buildvcs=false -mod=readonly \
            -ldflags "-s -w -buildid= -X platform-agent/internal/config.BuildVersion=${REPRO_BUILD_VERSION}" \
            -o "${RUNNER_TEMP}/agent-1.exe" ./cmd/endpoint-agent
          # No .syso may be LINKED into a reproducible build (resourceless/unsigned).
          # Build-tag-aware: ask the linker's own dependency graph for SysoFiles
          # (catches a .syso anywhere on the import path, not just two dirs — Codex P2).
          SYSO=$(go list -deps -f '{{if .SysoFiles}}{{.ImportPath}} {{.SysoFiles}}{{end}}' ./cmd/endpoint-agent)
          if [ -n "${SYSO}" ]; then
            echo "::error::a .syso resource is linked — the reproducible proof must be resourceless: ${SYSO}"
            exit 1
          fi

      - name: Build #2 (separate isolated cache — same source)
        run: |
          GOCACHE="${RUNNER_TEMP}/gocache-2" \
          go build -trimpath -buildvcs=false -mod=readonly \
            -ldflags "-s -w -buildid= -X platform-agent/internal/config.BuildVersion=${REPRO_BUILD_VERSION}" \
            -o "${RUNNER_TEMP}/agent-2.exe" ./cmd/endpoint-agent

      - name: Assert byte-identical (SHA-256)
        run: |
          H1=$(sha256sum "${RUNNER_TEMP}/agent-1.exe" | awk '{print $1}')
          H2=$(sha256sum "${RUNNER_TEMP}/agent-2.exe" | awk '{print $1}')
          echo "build #1 sha256: ${H1}"
          echo "build #2 sha256: ${H2}"
          {
            echo "## Reproducible-build proof (D10-5a)"
            echo ""
            echo "| field | value |"
            echo "|---|---|"
            echo "| commit | \`${GITHUB_SHA}\` |"
            echo "| Go | \`${{ steps.go-version.outputs.version }}\` (go.mod pin, GOTOOLCHAIN=local) |"
            echo "| target | \`${GOOS}/${GOARCH}\` CGO_ENABLED=${CGO_ENABLED} |"
            echo "| flags | \`-trimpath -buildvcs=false -mod=readonly -buildid= -s -w\` |"
            echo "| BuildVersion | \`${REPRO_BUILD_VERSION}\` (pinned, run-number-free) |"
            echo "| SOURCE_DATE_EPOCH | \`${SOURCE_DATE_EPOCH}\` |"
            echo "| build #1 sha256 | \`${H1}\` |"
            echo "| build #2 sha256 | \`${H2}\` |"
            echo ""
            echo "> Provenance hash of the UNSIGNED build. The signed release exe / MSI carry a"
            echo "> DIFFERENT runtime hash (signature+timestamp) — the runtime attestation allowlist"
            echo "> (D10-5b/c) uses that, never this proof hash."
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "${H1}" != "${H2}" ]; then
            echo "::error::reproducible-build FAILED — two builds of the same source differ (${H1} != ${H2})"
            exit 1
          fi
          echo "reproducible-build OK: byte-identical (${H1})"
